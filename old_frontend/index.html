<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <title>FastAPI Authentication</title>

    <link rel="stylesheet" href="./styles.css" />
  </head>

  <body>
    <main class="container">
      <h1>FastAPI Authentication</h1>

      <section class="card">
        <h2>Login</h2>

        <form id="login-form">
          <label for="username">Username</label>
          <input
            id="username"
            name="username"
            type="text"
            autocomplete="username"
            required
          />

          <label for="password">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
            required
          />

          <button id="login-button" type="submit">
            Log in
          </button>
        </form>
      </section>

      <section class="card">
        <h2>Protected endpoints</h2>

        <div class="button-group">
          <button id="me-button" type="button">
            Get current user
          </button>

          <button id="admin-button" type="button">
            Call admin endpoint
          </button>

          <button id="refresh-button" type="button">
            Refresh tokens manually
          </button>

          <button id="logout-button" type="button">
            Clear local session
          </button>
        </div>
      </section>

      <section class="card">
        <h2>Status</h2>
        <p id="status">Not logged in</p>
      </section>

      <section class="card">
        <h2>Response</h2>
        <pre id="output">No response yet.</pre>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
